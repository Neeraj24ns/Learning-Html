<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html ARIA example1</title>
    <link rel="icon" type="image/png" sizes="32*32" href="E:\FILE\neeraj.jpg">
</head>
<body>
    <nav role="navigation" aria-label="Main-Menu">
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
        </ul>
    </nav>

    <button aria-label="Close popup">close</button>

    <div aria-live="polite" aria-atomic="true" id="status">Status updates will appear here.</div>

    <form>
        <label for="username">Username:</label>
        <input type="text" 
        id="username"
        aria-describedby="help-text"
        aria-required="true"
        required>
<br>
        <span id="help-text">Enter your username</span>

        <br><br>

        <buttton type="submit">Submit</button>
    </form>
    <div aria-hidden="true">
        decorrative star
    </div>
</body>
</html>
